global:
  scrape_interval: 15s

scrape_configs:
  - job_name: gateway
    metrics_path: /metrics
    static_configs:
      - targets: ["gateway:3000"]
  - job_name: auth-service
    metrics_path: /metrics
    static_configs:
      - targets: ["auth-service:3001"]
  - job_name: business-service
    metrics_path: /metrics
    static_configs:
      - targets: ["business-service:3002"]
  - job_name: orchestrator-service
    metrics_path: /metrics
    static_configs:
      - targets: ["orchestrator-service:8000"]
  - job_name: template-service
    metrics_path: /metrics
    static_configs:
      - targets: ["template-service:8001"]
  - job_name: fabric-service
    metrics_path: /metrics
    static_configs:
      - targets: ["fabric-service:8002"]
  - job_name: tryon-service
    metrics_path: /metrics
    static_configs:
      - targets: ["tryon-service:8003"]

